name: CI - Extended Build + Fuzzing Tests

on:
  push:
  pull_request:

jobs:
  build-and-extended-fuzz:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential python3 timeout

      - name: Build mandatory with sanitizers
        run: |
          make fclean || true
          make CPP_FLAGS="-Wall -Wextra -Werror -std=c++2a -g -Og -fsanitize=address,undefined,leak -fno-omit-frame-pointer"

      - name: Save mandatory binary
        run: mv computor computor_mandatory || true

      - name: Build bonus with sanitizers
        run: |
          make fclean || true
          make bonus CPP_FLAGS="-Wall -Wextra -Werror -std=c++2a -g -Og -fsanitize=address,undefined,leak -fno-omit-frame-pointer"

      - name: Save bonus binary
        run: mv computor computor_bonus || true

      - name: Add execute permission to test script
        run: chmod +x .github/scripts/run_fuzz_tests.sh

      - name: Run extended fuzz + sanitizer tests
        run: .github/scripts/run_fuzz_tests.sh
